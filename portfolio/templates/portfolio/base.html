<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile.name }} | Portfolio</title>
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="nav-logo">{{ profile.name }}</div>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#research">Research</a></li>
            <li><a href="#certifications">Certifications</a></li>
            <li><a href="#achievements">Achievements</a></li>
            <li><a href="#extra">Activities</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p>© 2025 {{ profile.name }} · Built with Django</p>
    </footer>

    <script src="{% static 'portfolio/js/main.js' %}"></script>
</body>
</html>
